# Site settings
title: "Matheus Araujo Resume"
description: "Matheus Araujo Software Developer Resume."

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "true"
resume_name:                    "Matheus Araujo"
resume_title:                   "Software Developer"

# used for the contact button in _layouts/resume.html
resume_contact_email:           "matheus.saraujo@gmail.com"

# the next two items are used for schema itemprops in _layouts/resume.html
resume_contact_telephone:       "+55 31 99 313 0067"
resume_contact_address:         ""

resume_header_contact_info:     ""
display_header_contact_info:    "false"

resume_header_intro: "<p>10+ years of experience in software development in several contexts. Solid background working with several technologies. Experience in cloud solutions, infra as code, continuous integration, test automation, complex integrations and systems evolutions and migrations. Curious, committed, communicative, adaptable and objective, always looking for new challenges and self-improvement. </p>"

# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work:        "yes"

# Decide which sections to use
# comment out to hide
resume_section_experience:      true
resume_section_education:       true
resume_section_projects:        true
resume_section_skills:          true
resume_section_recognition:     true
resume_section_links:           true
resume_section_associations:    true
# resume_section_interests:       true

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
  resume_github_url:            "https://github.com/matheusaraujo"
  resume_twitter_url:           "http://twitter.com/matheus88_bhz"
  # resume_dribbble_url:          "https://dribbble.com/jag"
  # resume_facebook_url:          "insert Facebook URL here"
  resume_linkedin_url:          "https://www.linkedin.com/in/matheussaraujo/"
  resume_instagram_url:         "https://www.instagram.com/matheus.araujo.88/"
  # resume_website_url:           "http://joelglovier.com"
  resume_medium_url:            "https://medium.com/@matheus.saraujo"
resume_print_social_links:      true

# Design settings
resume_theme:                   default

